  batchexecutioner:
    build: ./batchexecutioner
    container_name: batchexecutioner
    hostname: batchexecutioner
    depends_on:
      - server1
      - server2
      - server3
      - broker1
      - broker2
      - broker3
    restart: on-failure



      # Clickhouse cluster
  server1:
    build: ./clickhouse #clickhouse/clickhouse-server:latest
    container_name: server1
    hostname: server1
    volumes:
      - ./clickhouse/config.d:/etc/clickhouse-server/config.d
      - ./clickhouse/users.d:/etc/clickhouse-server/users.d
      #- ./data/server1:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "19000:9000"
    depends_on:
      - broker1
      - broker2
      - broker3

  server2:
    build: ./clickhouse #clickhouse/clickhouse-server:latest
    container_name: server2
    hostname: server2
    volumes:
      - ./clickhouse/config.d:/etc/clickhouse-server/config.d
      - ./clickhouse/users.d:/etc/clickhouse-server/users.d
      #- ./data/server2:/var/lib/clickhouse
    ports:
      - "8124:8123"
      - "19001:9000"
    depends_on:
      - broker1
      - broker2
      - broker3

  server3:
    build: ./clickhouse #clickhouse/clickhouse-server:latest
    container_name: server3
    hostname: server3
    volumes:
      - ./clickhouse/config.d:/etc/clickhouse-server/config.d
      - ./clickhouse/users.d:/etc/clickhouse-server/users.d
      #- ./data/server3:/var/lib/clickhouse
    ports:
      - "8125:8123"
      - "19002:9000"
    depends_on:
      - broker1
      - broker2
      - broker3

