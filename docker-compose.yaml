services:

# kafka topic initialization
  kafka-init:
    image: apache/kafka:latest
    depends_on:
      - broker1
      - broker2
      - broker3
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      sleep 10
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic linux_consts --partitions 1 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic iowait --partitions 1 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic aio_getevents --partitions 1 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic aio_submit --partitions 1 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic aio_staging --partitions 1 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic aio_file --partitions 1 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic upsert_pending --partitions 1 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic tcp_discovery --partitions 1 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic vfs --partitions 1 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic vfs_staging --partitions 1 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic futex_wait --partitions 1 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic futex_wait_staging --partitions 1 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic futex_wake --partitions 1 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic muxio_wait --partitions 1 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic muxio_staging --partitions 1 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic muxio_file --partitions 1 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic socket_context --partitions 1 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic socket_inet --partitions 1 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic socket_map --partitions 1 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic taskstats --partitions 1 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic docker --partitions 1 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic k8s --partitions 1 --replication-factor 1
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker1:9092 --create --if-not-exists --topic process_context --partitions 1 --replication-factor 1
      echo 'Topics created'
      "
  #kafka brokers
  broker1:
    image: apache/kafka:latest
    container_name: broker1
    hostname: broker1
    environment:
      KAFKA_KRAFT_CLUSTER_ID: my-cluster
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker1:9093,2@broker2:9093,3@broker3:9093"
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker1:9092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
    #volumes:
      #- ./kafka/topic-creation.sh:/topic-creation.sh
      #- ./data/broker1:/var/lib/kafka/data
    ports:
      - "19092:19092"
    restart: always
    #post_start:
    #  - command: ./topic-creation.sh

  broker2:
    image: apache/kafka:latest
    container_name: broker2
    hostname: broker2
    environment:
      KAFKA_KRAFT_CLUSTER_ID: my-cluster
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker1:9093,2@broker2:9093,3@broker3:9093"
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker2:9092,EXTERNAL://localhost:19093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
    #volumes:
      #- ./data/broker2:/var/lib/kafka/data
    ports:
      - "19093:19092"
    restart: always

  broker3:
    image: apache/kafka:latest
    container_name: broker3
    hostname: broker3
    environment:
      KAFKA_KRAFT_CLUSTER_ID: my-cluster
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker1:9093,2@broker2:9093,3@broker3:9093"
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker3:9092,EXTERNAL://localhost:19094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
    #volumes:
      #- ./data/broker3:/var/lib/kafka/data
    ports:
      - "19094:19092"
    restart: always


